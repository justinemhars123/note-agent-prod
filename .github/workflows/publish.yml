name: Publish Docker image to GHCR

on:
  push:
    branches: [ main ]
    tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test -- --runInBand

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Determine image tags
        id: meta
        run: |
          TAGS="ghcr.io/${{ github.repository_owner }}/note-to-action-agent:latest"
          TAGS="$TAGS
ghcr.io/${{ github.repository_owner }}/note-to-action-agent:${{ github.sha }}"
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAGS="$TAGS
ghcr.io/${{ github.repository_owner }}/note-to-action-agent:${{ github.ref_name }}"
          fi
          echo "IMAGE_TAGS<<EOF" >> $GITHUB_OUTPUT
          echo "$TAGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.IMAGE_TAGS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
